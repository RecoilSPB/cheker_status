<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Коммиты - NSI Git Monitor</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app">
    <aside class="sidebar" th:replace="~{fragments/sidebar :: sidebar(${active})}"></aside>
    <main class="main">
        <div class="topbar">
            <th:block th:replace="~{fragments/common :: topbarTitleText('Коммиты', 'Последние коммиты GitLab, связанные с документами справочника')}"></th:block>
            <a class="button secondary" th:href="@{/documents}">К документам</a>
        </div>

        <section th:replace="~{fragments/common :: catalogStats(${stats})}"></section>

        <section class="panel">
            <div class="panel-header">
                <div class="panel-title">Последние коммиты</div>
                <div class="muted" th:text="${#lists.size(commits)} + ' строк'">0 строк</div>
            </div>
            <table class="table">
                <thead>
                <tr>
                    <th>Документ</th>
                    <th>Commit</th>
                    <th>Автор</th>
                    <th>Файлы</th>
                    <th>Дата</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="commit : ${commits}">
                    <td>
                        <a th:href="@{/documents/{id}(id=${commit.documentId})}">
                            <div class="document-name" th:text="${commit.documentName}">Название документа</div>
                        </a>
                    </td>
                    <td>
                        <div class="document-name" th:text="${commit.title ?: commit.shortSha}">commit title</div>
                        <div class="technical" th:text="${commit.shortSha}">sha</div>
                    </td>
                    <td th:text="${commit.authorName ?: ''}">author</td>
                    <td>
                        <span th:if="${commit.fileHistoryLoaded}" th:text="${commit.fileCount}">0</span>
                        <span class="muted" th:unless="${commit.fileHistoryLoaded}">не загружено</span>
                    </td>
                    <td class="muted" th:text="${commit.committedDate ?: ''}">date</td>
                    <td>
                        <a class="button secondary" th:if="${commit.webUrl != null}" th:href="${commit.webUrl}" target="_blank" rel="noreferrer">GitLab</a>
                    </td>
                </tr>
                </tbody>
            </table>
            <div class="empty" th:if="${#lists.isEmpty(commits)}">Коммиты пока не загружены</div>
        </section>
    </main>
</div>
</body>
</html>

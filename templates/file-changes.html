<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>История файлов - NSI Git Monitor</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app">
    <aside class="sidebar" th:replace="~{fragments/sidebar :: sidebar(${active})}"></aside>
    <main class="main">
        <div class="topbar">
            <th:block th:replace="~{fragments/common :: topbarTitleText('История файлов', 'Изменения файлов по документам: тип изменения, commit и статус загрузки content')}"></th:block>
            <a class="button secondary" th:href="@{/documents}">К документам</a>
        </div>

        <section th:replace="~{fragments/common :: catalogStats(${stats})}"></section>

        <section class="panel">
            <div class="panel-header">
                <div class="panel-title">Последние изменения файлов</div>
                <div class="muted" th:text="${#lists.size(fileChanges)} + ' строк'">0 строк</div>
            </div>
            <table class="table">
                <thead>
                <tr>
                    <th>Документ</th>
                    <th>Файл</th>
                    <th>Тип</th>
                    <th>Commit</th>
                    <th>Content</th>
                    <th>Дата</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="file : ${fileChanges}">
                    <td>
                        <a th:href="@{/documents/{id}(id=${file.documentId},file=${file.id})}">
                            <div class="document-name" th:text="${file.documentName}">Название документа</div>
                        </a>
                    </td>
                    <td>
                        <a th:href="@{/documents/{id}(id=${file.documentId},file=${file.id})}">
                            <div class="document-name" th:text="${file.filePath}">path</div>
                            <div class="technical" th:text="${file.oldPath} + ' -> ' + ${file.newPath}">old -> new</div>
                        </a>
                    </td>
                    <td><span class="change" th:classappend="${file.changeTypeCss}" th:text="${file.changeType}">modified</span></td>
                    <td class="mono" th:text="${file.shortSha}">sha</td>
                    <td><span class="status" th:classappend="${file.statusCss}" th:text="${file.contentFetchStatus}">SUCCESS</span></td>
                    <td class="muted" th:text="${file.committedDate ?: ''}">date</td>
                </tr>
                </tbody>
            </table>
            <div class="empty" th:if="${#lists.isEmpty(fileChanges)}">История файлов пока не загружена</div>
        </section>
    </main>
</div>
</body>
</html>

<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>
<aside id="sidebar" class="sidebar" th:fragment="sidebar(active)">
    <div class="sidebar-header">
        <div class="brand"><span class="brand-mark">N</span><span>NSI Git Monitor</span></div>
        <button class="sidebar-close"
                type="button"
                data-sidebar-close
                aria-label="Закрыть меню">×</button>
    </div>
    <nav class="nav">
        <a th:if="${@securityAccessService.canViewDashboard()}"
           th:classappend="${active == 'dashboard'} ? 'active' : ''"
           th:href="@{/dashboard}">Дашборд</a>
        <a th:if="${@securityAccessService.canViewDocuments()}"
           th:classappend="${active == 'documents'} ? 'active' : ''"
           th:href="@{/documents}">Документы</a>
        <a th:if="${@securityAccessService.canViewCommits()}"
           th:classappend="${active == 'commits'} ? 'active' : ''"
           th:href="@{/commits}">Коммиты</a>
        <a th:if="${@securityAccessService.canViewFileChanges()}"
           th:classappend="${active == 'fileChanges'} ? 'active' : ''"
           th:href="@{/file-changes}">История файлов</a>
        <a th:if="${@securityAccessService.canViewDocuments()}"
           th:href="@{/documents(status='ERROR')}">Ошибки</a>
        <a th:if="${@securityAccessService.canManageUsers()}"
           th:classappend="${active == 'users'} ? 'active' : ''"
           th:href="@{/admin/users}">Пользователи</a>
    </nav>

    <div class="sidebar-footer">
        <div class="sidebar-session">
            <div class="sidebar-user-label"
                 th:text="${@securityAccessService.isSecurityEnabled() ? 'Пользователь' : 'Доступ'}">Пользователь</div>
            <div class="sidebar-user-name"
                 th:text="${@securityAccessService.isSecurityEnabled() ? (@securityAccessService.currentUsername() ?: 'Не авторизован') : 'Защита отключена'}">admin</div>
        </div>
        <form class="sidebar-logout"
              th:if="${@securityAccessService.isAuthenticated()}"
              th:action="@{/logout}"
              method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="button secondary button-full" type="submit">Выйти</button>
        </form>
    </div>
    <script th:src="@{/js/sidebar.js}"></script>
</aside>
</body>
</html>

spring:
  application:
    name: cheker-status
  thymeleaf:
    prefix: file:${APP_TEMPLATES_PATH:./templates/}
    cache: ${APP_TEMPLATES_CACHE:false}
    check-template-location: true
  web:
    resources:
      static-locations: file:${APP_STATIC_PATH:./static/}
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/checker_status}
    username: ${DB_USERNAME:checker_status}
    password: ${DB_PASSWORD:checker_status}
  flyway:
    enabled: true
app:
  security:
    enabled: ${APP_SECURITY_ENABLED:true}
    username: ${APP_USERNAME:admin}
    password: ${APP_PASSWORD:}

nsi:
  user-key: ${NSI_USER_KEY:}
  passport-url-template: ${NSI_PASSPORT_URL_TEMPLATE:http://nsi.rosminzdrav.ru/port/rest/passport?identifier={identifier}&userKey={userKey}}
  data-url-template: ${NSI_DATA_URL_TEMPLATE:https://nsi.rosminzdrav.ru/port/rest/data?userKey={userKey}&identifier={identifier}&page={page}&size={size}}
  page-size: ${NSI_PAGE_SIZE:100}
  progress-git-link-weight: ${NSI_PROGRESS_GIT_LINK_WEIGHT:100}
  poll-fixed-delay-ms: ${NSI_POLL_FIXED_DELAY_MS:3600000}
  poll-initial-delay-ms: ${NSI_POLL_INITIAL_DELAY_MS:60000}
  trust-all-ssl: ${NSI_TRUST_ALL_SSL:false}
  sync-on-startup: ${NSI_SYNC_ON_STARTUP:false}
  dictionaries:
    - identifier: 1.2.643.5.1.13.13.99.2.638
      enabled: true

gitlab:
  enabled: ${GITLAB_ENABLED:true}
  require-token: ${GITLAB_REQUIRE_TOKEN:true}
  base-url: ${GITLAB_BASE_URL:https://git.minzdrav.gov.ru}
  token: ${GITLAB_TOKEN:}
  per-page: ${GITLAB_PER_PAGE:100}
  max-pages: ${GITLAB_MAX_PAGES:1000}
  max-documents-per-run: ${GITLAB_MAX_DOCUMENTS_PER_RUN:0}
  file-history-enabled: ${GITLAB_FILE_HISTORY_ENABLED:true}
  fetch-file-content: ${GITLAB_FETCH_FILE_CONTENT:true}
  max-files-per-commit: ${GITLAB_MAX_FILES_PER_COMMIT:1000}
  max-file-size-bytes: ${GITLAB_MAX_FILE_SIZE_BYTES:1048576}
  retry-count: ${GITLAB_RETRY_COUNT:3}
  retry-delay-ms: ${GITLAB_RETRY_DELAY_MS:1000}
  max-concurrent-projects: ${GITLAB_MAX_CONCURRENT_PROJECTS:8}
  max-concurrent-commits: ${GITLAB_MAX_CONCURRENT_COMMITS:16}
  max-concurrent-files: ${GITLAB_MAX_CONCURRENT_FILES:32}
  max-concurrent-db-writes: ${GITLAB_MAX_CONCURRENT_DB_WRITES:8}
  request-timeout-ms: ${GITLAB_REQUEST_TIMEOUT_MS:30000}

logging:
  level:
    ru.spb.reshenie: TRACE

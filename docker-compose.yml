services:
  postgres:
    image: postgres:14
    container_name: cheker-status-postgres
    environment:
      POSTGRES_DB: checker_status
      POSTGRES_USER: checker_status
      POSTGRES_PASSWORD: checker_status
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U checker_status -d checker_status"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: cheker-status-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: cheker-status-app
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/checker_status
      DB_USERNAME: checker_status
      DB_PASSWORD: checker_status
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD:?Set APP_PASSWORD before starting the app}
      APP_TEMPLATES_PATH: /app/templates/
      APP_TEMPLATES_CACHE: "false"
      APP_STATIC_PATH: /app/static/
      NSI_USER_KEY: ${NSI_USER_KEY:?Set NSI_USER_KEY before starting the app}
      GITLAB_TOKEN: ${GITLAB_TOKEN:?Set GITLAB_TOKEN before starting the app}
      NSI_TRUST_ALL_SSL: ${NSI_TRUST_ALL_SSL:-false}
      NSI_SYNC_ON_STARTUP: ${NSI_SYNC_ON_STARTUP:?Set NSI_SYNC_ON_STARTUP before starting the app}
      MINIO_ENABLED: ${MINIO_ENABLED:-true}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-gitlab-file-history}
      MINIO_OBJECT_PREFIX: ${MINIO_OBJECT_PREFIX:-gitlab}
      MINIO_AUTO_CREATE_BUCKET: ${MINIO_AUTO_CREATE_BUCKET:-true}
    ports:
      - "8080:8080"
    volumes:
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro

volumes:
  postgres-data:
  minio-data:
